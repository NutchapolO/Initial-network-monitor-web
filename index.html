<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Health Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .status-card { 
            background: #1e1e1e; padding: 20px; border-radius: 10px; 
            margin-bottom: 20px; border-left: 5px solid #00ff00;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-export {
            background: #007bff; color: white; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .btn-export:hover { background: #0056b3; }
        canvas { background: #1e1e1e; border-radius: 10px; padding: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌐 Network Monitor Dashboard</h2>
        <div class="status-card">
            <div>
                <div id="current-speed" style="font-size: 1.2em; font-weight: bold;">Checking...</div>
                <div id="link-speed" style="color: #aaa;">Target Link: 1729 Mbps</div>
            </div>
            <button class="btn-export" onclick="exportToCSV()">💾 Export CSV</button>
        </div>
        <canvas id="networkChart"></canvas>
    </div>

    <script>
        const logs = []; // เก็บข้อมูลไว้สำหรับ Export
        const ctx = document.getElementById('networkChart').getContext('2d');
        const networkChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [],
                    borderColor: '#00ff00',
                    backgroundColor: 'rgba(0, 255, 0, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#333' } },
                    x: { grid: { display: false } }
                }
            }
        });

        async function measureLatency() {
            const start = Date.now();
            try {
                // ใช้ Cloudflare trace เพื่อเลี่ยง CORS และตรวจสอบความเสถียร
                // await fetch('https://1.1.1.1/cdn-cgi/trace', { mode: 'no-cors', cache: 'no-cache' });
                await fetch('https://nutchapolomm.github.io/favicon.ico', { mode: 'no-cors', cache: 'no-cache' });
                const duration = Date.now() - start;
                const now = new Date().toLocaleTimeString();

                // บันทึกข้อมูลเข้า Array
                logs.push({ time: new Date().toLocaleString(), latency: duration });

                // อัปเดตกราฟ (โชว์ 40 จุดล่าสุด)
                if (networkChart.data.labels.length > 40) {
                    networkChart.data.labels.shift();
                    networkChart.data.datasets[0].data.shift();
                }
                networkChart.data.labels.push(now);
                networkChart.data.datasets[0].data.push(duration);
                networkChart.data.update('none'); // update แบบนิ่มนวล

                const card = document.querySelector('.status-card');
                document.getElementById('current-speed').innerText = `Current Latency: ${duration} ms`;
                card.style.borderLeft = duration > 100 ? "5px solid #ff4444" : "5px solid #00ff00";

            } catch (e) {
                document.getElementById('current-speed').innerText = "Offline / Blocked";
            }
        }

        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Timestamp,Latency(ms)\n";
            logs.forEach(log => {
                csvContent += `${log.time},${log.latency}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "network_log.csv");
            document.body.appendChild(link);
            link.click();
        }

        setInterval(measureLatency, 3000); // เช็คทุก 3 วินาที
    </script>
</body>
</html>
