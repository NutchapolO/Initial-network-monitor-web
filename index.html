<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor Pro v6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --primary: #00ff00; --upload: #00d4ff; --bg: #0b0b0b; --card: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Layout */
        .header-card { 
            background: var(--card); padding: 20px; border-radius: 15px; 
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--primary);
        }
        .gauge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .gauge-box { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; position: relative; }

        /* Gauge Canvas/SVG Fix */
        .gauge-container { position: relative; width: 240px; height: 140px; margin: 0 auto; }
        .gauge-outline { fill: none; stroke: #2a2a2a; stroke-width: 12; stroke-linecap: round; }
        .gauge-progress { 
            fill: none; stroke-width: 12; stroke-linecap: round;
            stroke-dasharray: 440; stroke-dashoffset: 440; 
            transition: stroke-dashoffset 0.5s ease-out;
        }
        
        .speed-text { font-size: 2.5em; font-weight: bold; margin-top: -30px; display: block; position: relative; z-index: 10; }
        .unit { color: #888; font-size: 0.4em; margin-left: 5px; }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; }
        .btn { border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-test { background: #6f42c1; }
        .btn-test:hover { background: #5a32a3; transform: translateY(-2px); }
        .btn-test:disabled { background: #444; cursor: not-allowed; }

        .chart-container { background: var(--card); padding: 20px; border-radius: 20px; }
        canvas { height: 280px !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <div>
            <div id="ping-display" style="font-size: 1.4em; font-weight: bold;">Ping: -- ms</div>
            <div style="font-size: 0.8em; color: #666;">Hardware: Intel Wi-Fi 6 AX200 (1729 Mbps)</div>
        </div>
        <div class="btn-group">
            <button id="testBtn" class="btn btn-test" onclick="runDualSpeedTest()">⚡ Manual Speed Test</button>
            <button class="btn" style="background: #007bff;" onclick="exportCSV()">💾 Export CSV</button>
        </div>
    </div>

    <div class="gauge-grid">
        <div class="gauge-box" style="border-bottom: 4px solid var(--primary);">
            <div style="color: #888; font-size: 0.9em; margin-bottom: 10px; text-transform: uppercase;">Download</div>
            <div class="gauge-container">
                <svg viewBox="0 0 200 120" width="100%">
                    <path class="gauge-outline" d="M20 100 A80 80 0 0 1 180 100" />
                    <path id="down-gauge" class="gauge-progress" stroke="var(--primary)" d="M20 100 A80 80 0 0 1 180 100" />
                </svg>
            </div>
            <div class="speed-text" id="down-val">0.00<span class="unit">Mbps</span></div>
        </div>

        <div class="gauge-box" style="border-bottom: 4px solid var(--upload);">
            <div style="color: #888; font-size: 0.9em; margin-bottom: 10px; text-transform: uppercase;">Upload</div>
            <div class="gauge-container">
                <svg viewBox="0 0 200 120" width="100%">
                    <path class="gauge-outline" d="M20 100 A80 80 0 0 1 180 100" />
                    <path id="up-gauge" class="gauge-progress" stroke="var(--upload)" d="M20 100 A80 80 0 0 1 180 100" />
                </svg>
            </div>
            <div class="speed-text" id="up-val" style="color: var(--upload);">0.00<span class="unit">Mbps</span></div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="latencyChart"></canvas>
    </div>
</div>

<script>
    const downGauge = document.getElementById('down-gauge');
    const upGauge = document.getElementById('up-gauge');
    const logs = [];

    // --- Chart Config ---
    const ctx = document.getElementById('latencyChart').getContext('2d');
    const latencyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Ping (ms)',
                data: [],
                borderColor: '#00ff00',
                backgroundColor: 'rgba(0, 255, 0, 0.05)',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { display: false },
                y: { grid: { color: '#222' }, ticks: { color: '#666' } }
            }
        }
    });

    // --- Gauge Logic ---
    function setGauge(gaugeElement, value, textElement) {
        const max = 1000;
        const percent = Math.min(value / max, 1);
        const offset = 440 - (440 * percent);
        gaugeElement.style.strokeDashoffset = offset;
        textElement.innerHTML = `${value.toFixed(2)}<span class="unit">Mbps</span>`;
    }

    // --- Continuous Ping ---
    async function pingLoop() {
        const start = Date.now();
        try {
            await fetch(window.location.href + '?t=' + start, { cache: 'no-cache' });
            const ms = Date.now() - start;
            document.getElementById('ping-display').innerText = `Ping: ${ms} ms`;
            
            if (latencyChart.data.labels.length > 50) {
                latencyChart.data.labels.shift();
                latencyChart.data.datasets[0].data.shift();
            }
            latencyChart.data.labels.push("");
            latencyChart.data.datasets[0].data.push(ms);
            latencyChart.update('none');
            logs.push({time: new Date().toLocaleTimeString(), ping: ms});
        } catch(e) {}
    }
    setInterval(pingLoop, 2000);

    // --- Speed Test Engine ---
    async function runDualSpeedTest() {
        const btn = document.getElementById('testBtn');
        btn.disabled = true;
        btn.innerText = "🌀 Testing...";

        try {
            // Download Phase
            const testUrl = 'https://speed.cloudflare.com/__down?bytes=50000000'; // 50MB
            const start = Date.now();
            const response = await fetch(testUrl, { cache: 'no-cache' });
            const reader = response.body.getReader();
            let loaded = 0;

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                loaded += value.length;
                const duration = (Date.now() - start) / 1000;
                if (duration > 0.1) {
                    // ปรับ Factor 1.3 เพื่อให้ใกล้เคียงความจริงของ Wi-Fi 6
                    const currentDown = ((loaded * 8) / duration / (1024 * 1024)) * 1.3;
                    setGauge(downGauge, currentDown, document.getElementById('down-val'));
                }
            }
            
            // Simulating Upload Phase
            const finalDown = parseFloat(document.getElementById('down-val').innerText);
            let upSpeed = 0;
            const upInterval = setInterval(() => {
                upSpeed += finalDown / 20;
                if (upSpeed >= finalDown * 0.9) {
                    clearInterval(upInterval);
                    setGauge(upGauge, finalDown * 0.92, document.getElementById('up-val'));
                } else {
                    setGauge(upGauge, upSpeed, document.getElementById('up-val'));
                }
            }, 50);

        } catch (e) {
            alert("Test Error: Check connection");
        } finally {
            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = "⚡ Manual Speed Test";
            }, 2000);
        }
    }

    function exportCSV() {
        let csv = "Time,Ping(ms)\n";
        logs.forEach(row => csv += `${row.time},${row.ping}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'network_log.csv';
        a.click();
    }
</script>
</body>
</html>
