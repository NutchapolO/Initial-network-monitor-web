<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Health Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .status-card { 
            background: #1e1e1e; padding: 25px; border-radius: 12px; 
            margin-bottom: 20px; border-left: 5px solid #00ff00;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-export { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .chart-container { background: #1e1e1e; border-radius: 12px; padding: 15px; }
        #current-speed { font-size: 1.4em; font-weight: bold; }
        .info-text { font-size: 0.9em; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌐 Network Monitor Dashboard</h2>
        <div class="status-card" id="main-card">
            <div>
                <div id="current-speed">Connecting to Sensor...</div>
                <div class="info-text">Target Link: 1729 Mbps (Wi-Fi 6)</div>
            </div>
            <button class="btn-export" onclick="exportToCSV()">💾 Export CSV</button>
        </div>
        <div class="chart-container">
            <canvas id="networkChart"></canvas>
        </div>
    </div>

    <script>
        const logs = [];
        const ctx = document.getElementById('networkChart').getContext('2d');
        
        const networkChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [],
                    borderColor: '#00ff00',
                    backgroundColor: 'rgba(0, 255, 0, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 2
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#333' }, ticks: { color: '#888' } },
                    x: { ticks: { color: '#888' } }
                }
            }
        });

        async function measureLatency() {
            const start = Date.now();
            try {
                // วิธีแก้ปัญหา Sensor Error: ดึง URL ปัจจุบันของหน้าเว็บตรงๆ 
                // window.location.href จะได้ https://nutchapolo.github.io/Initial-network-monitor-web/ แน่นอน
                await fetch(window.location.href, { 
                    mode: 'same-origin', 
                    cache: 'no-cache' 
                });
                
                const duration = Date.now() - start;
                const now = new Date().toLocaleTimeString();

                logs.push({ time: new Date().toLocaleString(), latency: duration });

                if (networkChart.data.labels.length > 50) {
                    networkChart.data.labels.shift();
                    networkChart.data.datasets[0].data.shift();
                }
                
                networkChart.data.labels.push(now);
                networkChart.data.datasets[0].data.push(duration);
                networkChart.data.update('none');

                document.getElementById('current-speed').innerText = `Current Latency: ${duration} ms`;
                document.getElementById('main-card').style.borderLeft = duration > 150 ? "5px solid #ff4444" : "5px solid #00ff00";

            } catch (e) {
                // ถ้ายังไม่ได้ ให้ลองดึง Path สั้นๆ
                try {
                    await fetch('index.html', { cache: 'no-cache' });
                    const duration = Date.now() - start;
                    document.getElementById('current-speed').innerText = `Current Latency: ${duration} ms (Fallback)`;
                } catch (err) {
                    document.getElementById('current-speed').innerText = "Sensor Error - Retrying...";
                }
            }
        }

        function exportToCSV() {
            if (logs.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,Timestamp,Latency(ms)\n";
            logs.forEach(log => { csvContent += `${log.time},${log.latency}\n`; });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "network_log.csv");
            document.body.appendChild(link);
            link.click();
        }

        setInterval(measureLatency, 2000); // เช็คทุก 2 วินาทีให้กราฟวิ่งเร็วขึ้นหน่อย
        measureLatency();
    </script>
</body>
</html>
