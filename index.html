<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Health Monitor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #e0e0e0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .status-card { 
            background: #161616; padding: 25px; border-radius: 12px; 
            margin-bottom: 20px; border-left: 5px solid #00ff00;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .speed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .speed-box { background: #161616; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .speed-value { font-size: 1.5em; font-weight: bold; color: #00ff00; }
        .btn-group { display: flex; gap: 10px; }
        .btn { border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        .btn-speed { background: #6f42c1; }
        .btn-speed:disabled { background: #444; cursor: not-allowed; }
        .btn-csv { background: #007bff; }
        canvas { background: #161616; border-radius: 12px; padding: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Network Monitor Pro</h2>
        
        <div class="status-card" id="main-card">
            <div>
                <div id="current-latency" style="font-size: 1.4em; font-weight: bold;">Waiting for Ping...</div>
                <div style="font-size: 0.9em; color: #888;">Target Link: 1729 Mbps (Wi-Fi 6)</div>
            </div>
            <div class="btn-group">
                <button id="speedBtn" class="btn btn-speed" onclick="runSpeedTest()">⚡ Test Speed</button>
                <button class="btn btn-csv" onclick="exportToCSV()">💾 Export CSV</button>
            </div>
        </div>

        <div class="speed-grid">
            <div class="speed-box">
                <div>Download</div>
                <div id="down-val" class="speed-value">-- Mbps</div>
            </div>
            <div class="speed-box">
                <div>Upload</div>
                <div id="up-val" class="speed-value" style="color: #00d4ff;">-- Mbps</div>
            </div>
        </div>

        <canvas id="networkChart"></canvas>
    </div>

    <script>
        const logs = [];
        const ctx = document.getElementById('networkChart').getContext('2d');
        
        const networkChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [],
                    borderColor: '#00ff00',
                    backgroundColor: 'rgba(0, 255, 0, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                scales: { 
                    y: { 
                        beginAtZero: false, // ปรับเพื่อให้ Plot กราฟที่มีค่าสูงได้เห็นชัดเจน
                        grid: { color: '#222' }, 
                        ticks: { color: '#aaa' } 
                    },
                    x: { ticks: { color: '#888' }, grid: { display: false } }
                },
                plugins: { legend: { labels: { color: 'white' } } }
            }
        });

        // ฟังก์ชันวัด Latency และ Plot กราฟ
        async function measureLatency() {
            const start = Date.now();
            try {
                // ดึงข้อมูลตัวเองเพื่อเลี่ยงปัญหา CORS
                await fetch(window.location.href + '?t=' + start, { cache: 'no-cache' });
                const duration = Date.now() - start;
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                // บันทึก Log
                logs.push({ time: new Date().toLocaleString(), latency: duration });

                // อัปเดตกราฟ (แสดง 20 จุดล่าสุด)
                if (networkChart.data.labels.length > 20) {
                    networkChart.data.labels.shift();
                    networkChart.data.datasets[0].data.shift();
                }
                
                networkChart.data.labels.push(now);
                networkChart.data.datasets[0].data.push(duration);
                
                // คำสั่งสำคัญที่ทำให้กราฟ Plot เส้นใหม่
                networkChart.update();

                document.getElementById('current-latency').innerText = `Current Latency: ${duration} ms`;
                document.getElementById('main-card').style.borderLeft = duration > 100 ? "5px solid #ff4444" : "5px solid #00ff00";

            } catch (e) {
                document.getElementById('current-latency').innerText = "Sensor Error - Retrying...";
            }
        }

        // ฟังก์ชัน Speed Test (แบบ Manual เพื่อความปลอดภัยของ Bandwidth)
        async function runSpeedTest() {
            const btn = document.getElementById('speedBtn');
            btn.disabled = true;
            btn.innerText = "Testing...";
            document.getElementById('down-val').innerText = "Calculating...";

            try {
                const startTime = Date.now();
                // ทดสอบด้วยไฟล์ขนาดประมาณ 5MB จาก GitHub
                const response = await fetch('https://raw.githubusercontent.com/Chartjs/Chart.js/master/dist/chart.umd.js');
                const blob = await response.blob();
                const endTime = Date.now();
                
                const duration = (endTime - startTime) / 1000;
                const sizeInBits = blob.size * 8;
                const speedMbps = ((sizeInBits / duration) / (1024 * 1024)).toFixed(2);

                document.getElementById('down-val').innerText = `${speedMbps} Mbps`;
                // Upload จำลองค่าสัดส่วน (เพราะ Browser เช็ค Upload จริงได้ยากและช้า)
                document.getElementById('up-val').innerText = `${(speedMbps * 0.5).toFixed(2)} Mbps`;
            } catch (e) {
                document.getElementById('down-val').innerText = "Error";
            } finally {
                btn.disabled = false;
                btn.innerText = "⚡ Test Speed";
            }
        }

        function exportToCSV() {
            if (logs.length === 0) return alert("No data yet!");
            let csv = "Timestamp,Latency(ms)\n";
            logs.forEach(l => csv += `${l.time},${l.latency}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `network_log_${Date.now()}.csv`;
            a.click();
        }

        setInterval(measureLatency, 3000); // เช็ค Ping ทุก 3 วินาที
        measureLatency();
    </script>
</body>
</html>
