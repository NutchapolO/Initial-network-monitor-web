<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Health Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .status-card { 
            background: #1e1e1e; padding: 20px; border-radius: 10px; 
            margin-bottom: 20px; border-left: 5px solid #00ff00;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-export { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        canvas { background: #1e1e1e; border-radius: 10px; padding: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌐 Network Monitor Dashboard</h2>
        <div class="status-card">
            <div>
                <div id="current-speed" style="font-size: 1.2em; font-weight: bold;">Initializing Sensor...</div>
                <div id="link-speed" style="color: #aaa;">Target Link: 1729 Mbps</div>
            </div>
            <button class="btn-export" onclick="exportToCSV()">💾 Export CSV</button>
        </div>
        <canvas id="networkChart"></canvas>
    </div>

    <script>
        const logs = [];
        const ctx = document.getElementById('networkChart').getContext('2d');
        const networkChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Latency (ms)',
                    data: [],
                    borderColor: '#00ff00',
                    backgroundColor: 'rgba(0, 255, 0, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });

        async function measureLatency() {
            const start = Date.now();
            try {
                // เปลี่ยน URL ตรงนี้เป็นชื่อ User GitHub ของคุณ
                await fetch('https://nutchapolo.github.io/favicon.ico', { mode: 'no-cors', cache: 'no-cache' });
                const duration = Date.now() - start;
                const now = new Date().toLocaleTimeString();

                logs.push({ time: new Date().toLocaleString(), latency: duration });

                if (networkChart.data.labels.length > 30) {
                    networkChart.data.labels.shift();
                    networkChart.data.datasets[0].data.shift();
                }
                networkChart.data.labels.push(now);
                networkChart.data.datasets[0].data.push(duration);
                networkChart.data.update();

                document.getElementById('current-speed').innerText = `Current Latency: ${duration} ms`;
                document.querySelector('.status-card').style.borderLeft = duration > 150 ? "5px solid #ff4444" : "5px solid #00ff00";
            } catch (e) {
                document.getElementById('current-speed').innerText = "Sensor Error - Check Connection";
            }
        }

        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Timestamp,Latency(ms)\n";
            logs.forEach(log => { csvContent += `${log.time},${log.latency}\n`; });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "network_log.csv");
            document.body.appendChild(link);
            link.click();
        }

        setInterval(measureLatency, 3000);
    </script>
</body>
</html>
