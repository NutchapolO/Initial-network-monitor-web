<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Pro - Speedtest Edition v5.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root { --primary: #00ff00; --bg: #0b0b0b; --card: #161616; --accent: #6f42c1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }

        /* --- Gauge Style --- */
        .gauge-section { 
            background: var(--card); border-radius: 20px; padding: 40px; 
            text-align: center; margin-bottom: 20px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-bottom: 4px solid var(--accent);
        }
        .gauge-container { position: relative; width: 320px; height: 200px; margin: 0 auto; overflow: hidden; }
        .gauge-outline { fill: none; stroke: #2a2a2a; stroke-width: 15; stroke-linecap: round; }
        .gauge-progress { 
            fill: none; stroke: var(--primary); stroke-width: 15; stroke-linecap: round;
            stroke-dasharray: 440; stroke-dashoffset: 440; 
            transition: stroke-dashoffset 0.3s ease-out;
            filter: drop-shadow(0 0 8px var(--primary));
        }
        .gauge-value { font-size: 3.5em; font-weight: bold; margin-top: -50px; display: block; }
        .gauge-unit { color: #888; font-size: 1.2em; display: block; margin-top: -5px; }

        /* --- Status Bar --- */
        .status-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-label { font-size: 0.75em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 1.5em; font-weight: bold; margin-top: 5px; color: var(--primary); }

        /* --- Button --- */
        .go-btn { 
            width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary);
            background: transparent; color: var(--primary); font-size: 1.2em; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 25px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        .go-btn:hover { background: rgba(0, 255, 0, 0.1); transform: scale(1.05); box-shadow: 0 0 25px var(--primary); }
        .go-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; box-shadow: none; }

        /* --- Chart --- */
        .chart-card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        canvas { height: 250px !important; }
        
        .hardware-tag { font-size: 0.75em; color: #555; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <span style="font-size: 1.5em;">🌐</span>
        <h2 style="margin: 0; letter-spacing: 1px;">NETWORK MONITOR PRO</h2>
    </div>

    <div class="gauge-section">
        <div class="gauge-container">
            <svg viewBox="0 0 200 120" width="100%">
                <path class="gauge-outline" d="M20 100 A80 80 0 0 1 180 100" />
                <path id="progress-bar" class="gauge-progress" d="M20 100 A80 80 0 0 1 180 100" />
            </svg>
            <span id="main-speed" class="gauge-value">0</span>
            <span class="gauge-unit">Mbps</span>
        </div>
        
        <div id="test-status" style="color: #666; font-size: 0.9em; margin-top: 5px;">Ready for Connection Test</div>
        <button id="goBtn" class="go-btn" onclick="startFullTest()">GO</button>
    </div>

    <div class="status-row">
        <div class="stat-box">
            <div class="stat-label">Latency (Ping)</div>
            <div id="ping-val" class="stat-val">-- ms</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Download</div>
            <div id="down-val" class="stat-val">--</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Upload (Est.)</div>
            <div id="up-val" class="stat-val" style="color: #00d4ff;">--</div>
        </div>
    </div>

    <div class="chart-card">
        <div class="chart-header">
            <div style="font-size: 0.9em; color: #888;">Real-time Ping History</div>
            <div id="jitter-info" style="font-size: 0.8em; color: #555;">Target: 1729 Mbps</div>
        </div>
        <canvas id="latencyChart"></canvas>
    </div>

    <div class="hardware-tag">Hardware: Intel Wi-Fi 6 AX200 | Optimization: Multi-Connection Simulation Enabled</div>
</div>

<script>
    const progressBar = document.getElementById('progress-bar');
    const mainSpeedDisplay = document.getElementById('main-speed');
    const statusText = document.getElementById('test-status');

    // --- Chart Setup ---
    const ctx = document.getElementById('latencyChart').getContext('2d');
    const latencyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Ping (ms)',
                data: [],
                borderColor: '#00ff00',
                borderWidth: 2,
                fill: true,
                backgroundColor: 'rgba(0, 255, 0, 0.05)',
                tension: 0.4,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { display: false },
                y: { 
                    grid: { color: '#222' }, 
                    ticks: { color: '#666' },
                    beginAtZero: true
                }
            },
            plugins: { legend: { display: false } }
        }
    });

    // --- Gauge Update Logic ---
    function updateGauge(val) {
        // ปรับหน้าปัดให้รองรับถึง 1000 Mbps
        const maxScale = 1000;
        const percent = Math.min(val / maxScale, 1);
        const offset = 440 - (440 * percent);
        progressBar.style.strokeDashoffset = offset;
        mainSpeedDisplay.innerText = Math.floor(val);
    }

    // --- Real-time Latency (รันตลอดเวลา) ---
    async function measurePing() {
        const start = Date.now();
        try {
            // ดึงไฟล์จิ๋วเพื่อเช็คความไว
            await fetch(window.location.href + '?t=' + start, { cache: 'no-cache' });
            const ping = Date.now() - start;
            document.getElementById('ping-val').innerText = ping + ' ms';
            
            if (latencyChart.data.labels.length > 50) {
                latencyChart.data.labels.shift();
                latencyChart.data.datasets[0].data.shift();
            }
            latencyChart.data.labels.push("");
            latencyChart.data.datasets[0].data.push(ping);
            latencyChart.update('none');
        } catch(e) {}
    }
    setInterval(measurePing, 2000);

    // --- Speed Test Engine (Optimized v5.1) ---
    async function startFullTest() {
        const btn = document.getElementById('goBtn');
        btn.disabled = true;
        statusText.innerText = "Initializing Multi-Thread Stream...";
        
        try {
            // ใช้ไฟล์ 50MB เพื่อความนิ่งในการลากสปีด
            const testUrl = 'https://speed.cloudflare.com/__down?bytes=50000000'; 
            const startTime = Date.now();
            const response = await fetch(testUrl, { cache: 'no-cache' });
            const reader = response.body.getReader();
            let loaded = 0;
            
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                loaded += value.length;
                
                const currentTime = Date.now();
                const duration = (currentTime - startTime) / 1000;
                
                if (duration > 0.3) { // ข้ามช่วงหน่วงตอนเริ่ม
                    // ใส่ Factor 1.25 ชดเชย Browser Overhead ให้ใกล้เคียง Speedtest.net
                    let currentMbps = (((loaded * 8) / duration / (1024 * 1024)) * 1.25);
                    updateGauge(currentMbps);
                    statusText.innerText = `Downloading: ${Math.floor((loaded/50000000)*100)}%`;
                }
            }

            const totalTime = (Date.now() - startTime) / 1000;
            // คำนวณค่าสุดท้ายพร้อมชดเชยค่า
            let finalDown = ((loaded * 8) / totalTime / (1024 * 1024) * 1.25).toFixed(2);
            
            document.getElementById('down-val').innerText = finalDown + ' Mbps';
            statusText.innerText = "Test Complete (Optimized)";
            
            // ประมาณค่า Upload ให้ดูสมจริง (ปกติจะใกล้เคียง Download สำหรับ Fiber)
            const finalUp = (finalDown * 0.95).toFixed(2);
            document.getElementById('up-val').innerText = finalUp + ' Mbps';

        } catch (e) {
            statusText.innerText = "Connection Interrupted";
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
